<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Empresas Registradas - ImpulsoNica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="admin">
    <!-- Sidebar lateral -->
    <aside class="sidebar">
        <nav>
            <div class="brand">
                <img src="/imgn/LogoImpulsoNica.png" alt="ImpulsoNica logo">

                <span class="logo-text">Impulso<span class="text-blue">Nica</span></span>
            </div>
            <a href="/html/admin.html">Inicio</a>
            <a href="/html/candidatosAdmi.html">Candidatos</a>
            <a href="#" class="active">Empresas</a>
            <a href="/html/vacantesAdmi.html">Vacantes</a>
            <a href="/html/postulacionesAdmi.html">Postulaciones</a>
            <a href="/index.html">Cerrar sesión</a>
        </nav>
    </aside>
    <!-- Contenido principal -->
    <main class="dashboard">
        <header>
            <h1>Empresas Registradas</h1>
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        </header>

        <section>
            <table>
                <thead>
                    <tr>
                        <th>Nombre de la Empresa</th>
                        <th>Sector</th>
                        <th>Ciudad</th>
                        <th>Vacantes Activas</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Claro Nicaragua</td>
                        <td>Tecnología</td>
                        <td>Managua</td>
                        <td>5</td>
                    </tr>
                    <tr>
                        <td>Tigo</td>
                        <td>Telecomunicaciones</td>
                        <td>León</td>
                        <td>3</td>
                    </tr>
                    <tr>
                        <td>Banco Lafise</td>
                        <td>Finanzas</td>
                        <td>Granada</td>
                        <td>2</td>
                    </tr>
                    <tr>
                        <td>Universidad UNAN</td>
                        <td>Educación</td>
                        <td>Matagalpa</td>
                        <td>4</td>
                    </tr>
                </tbody>
            </table>
            <section class="charts">
                <div class="chart-box"><canvas id="graficoEmpresasSector"></canvas></div>
                <div class="chart-box"><canvas id="graficoEmpresasCiudad"></canvas></div>
            </section>
    </main>

    <script>
        // Función para alternar el menú lateral en dispositivos móviles//
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
        }
        // Gráfico de empresas por sector
        new Chart(document.getElementById('graficoEmpresasSector'), {
            type: 'doughnut',
            data: {
                labels: ['Tecnología', 'Telecomunicaciones', 'Finanzas', 'Educación'],
                datasets: [{
                    data: [12, 8, 6, 10],
                    backgroundColor: ['#007bff', '#28a745', '#ffc107', '#17a2b8']
                }]
            }
        });
        new Chart(document.getElementById('graficoEmpresasCiudad'), {
            type: 'bar',
            data: {
                labels: ['Managua', 'León', 'Granada', 'Matagalpa'],
                datasets: [{
                    label: 'Empresas por Ciudad',
                    data: [15, 10, 8, 5],
                    backgroundColor: '#28a745'
                }]
            },
            options: {
                indexAxis: 'y'
            }
        });
    </script>
</body>

</html>

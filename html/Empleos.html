<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpulsoNica - Ofertas de Empleo</title>
    <link rel="stylesheet" href="/Styles.css">
</head>

<body class="empleos">
    <header>
        <nav class="navbar">
            <a href="/index.html" class="back-btn">
                <img src="/imgn/BackB.webp" alt="Atrás">
            </a>
            <span class="brand-name">Ofertas de Empleo</span>
            <img src="/imgn/LogoImpulsoNica.png" alt="ImpulsoNica logo" class="logo-header">
        </nav>
    </header>

    <main class="vacantes-container">
        <div class="contenedor-busqueda">
            <form class="form-busqueda" id="formBusquedaEmpleos">
                <select id="searchRubro" class="buscador-select">
                    <option value="">Todos los rubros...</option>
                </select>
                <select id="searchUbicacion" class="buscador-select">
                    <option value="">Todas las ubicaciones...</option>
                </select>
                <button type="submit" class="boton-select">Buscar</button>
            </form>
        </div>

        <!-- AQUÍ SE DIBUJARÁN LOS EMPLEOS DINÁMICAMENTE -->
        <div id="contenedorListaEmpleos"></div>
        
    </main>
    <script src="../Scripts/empleos.js"></script>
</body>

</html>

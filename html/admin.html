<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Gerencial - ImpulsoNica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/Styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="admin">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>ImpulsoNica</h2>
        <nav>
            <a href="#" class="active">Inicio</a>
            <a href="#">Candidatos</a>
            <a href="#">Empresas</a>
            <a href="#">Vacantes</a>
            <a href="#">Postulaciones</a>
            <a href="index.html">Cerrar sesión</a>
        </nav>
    </aside>

    <!-- Dashboard -->
    <main class="dashboard">
        <header>
            <h1>DASHBOARD GERENCIAL</h1>
        </header>

        <!-- Tarjetas resumen -->
        <section class="summary-cards">
            <div class="card">
                <h3>Salario más alto</h3>
                <p>$1501 (Tecnología y Sistemas)</p>
            </div>
            <div class="card">
                <h3>Vacantes Remotas</h3>
                <p>30.8%</p>
            </div>
            <div class="card">
                <h3>Tiempo promedio cierre</h3>
                <p>25–34 días</p>
            </div>
            <div class="card">
                <h3>Vacantes publicadas en diciembre</h3>
                <p>95</p>
            </div>
        </section>

        <section class="charts">
            <div class="chart-box"><canvas id="salariosSector"></canvas></div>
            <div class="chart-box"><canvas id="eficienciaVacantes"></canvas></div>
            <div class="chart-box"><canvas id="vacantesModalidad"></canvas></div>
            <div class="chart-box"><canvas id="tendenciaMeses"></canvas></div>
        </section>

    </main>

    <script>
        // 1. Salario Promedio por Sector Industrial
        new Chart(document.getElementById('salariosSector'), {
            type: 'bar',
            data: {
                labels: ['Tecnología y Sistemas', 'Construcción', 'Call Center y BPO', 'Salud y Medicina', 'Banca y Finanzas', 'Comercio y Retail'],
                datasets: [{
                    label: 'Salario Promedio ($)',
                    data: [1501, 1025, 929, 871, 863, 590],
                    backgroundColor: '#007bff'
                }]
            },
            options: {
                indexAxis: 'y'
            }
        });

        // 2. Eficiencia: Días para cerrar vacantes
        new Chart(document.getElementById('eficienciaVacantes'), {
            type: 'bar',
            data: {
                labels: ['Managua', 'Masaya', 'León', 'Estelí', 'Granada', 'Matagalpa'],
                datasets: [{
                    label: 'Días promedio',
                    data: [25, 26, 27, 29, 30, 34],
                    backgroundColor: '#28a745'
                }]
            }
        });

        // 3. Distribución de Vacantes por Modalidad
        new Chart(document.getElementById('vacantesModalidad'), {
            type: 'pie',
            data: {
                labels: ['Remoto', 'Híbrido', 'Presencial'],
                datasets: [{
                    data: [30.8, 35.6, 33.6],
                    backgroundColor: ['#17a2b8', '#ffc107', '#6f42c1']
                }]
            }
        });

        // 4. Tendencia de Publicación por Mes
        new Chart(document.getElementById('tendenciaMeses'), {
            type: 'line',
            data: {
                labels: ['Enero', 'Febrero', 'Marzo', 'Abril', 'Noviembre', 'Diciembre'],
                datasets: [{
                    label: 'Cantidad de Vacantes',
                    data: [40, 55, 70, 65, 80, 95],
                    borderColor: '#dc3545',
                    fill: false,
                    tension: 0.3
                }]
            }
        });
        
    </script>
</body>

</html>
